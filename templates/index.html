<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Perfect Release AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cyan:    #00f2fe;
    --yellow:  #f5e642;
    --bg:      #080a0f;
    --surface: #0e1118;
    --border:  rgba(255,255,255,0.07);
    --text:    #e8eaf2;
    --muted:   #525769;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body:    'DM Sans', sans-serif;
    --radius: 20px;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); line-height: 1.6; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; opacity: 0.4; }
  .hero { position: relative; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 24px 80px; text-align: center; overflow: hidden; }
  .hero::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -55%); width: 700px; height: 700px; background: radial-gradient(circle, rgba(0,242,254,0.08) 0%, transparent 70%); pointer-events: none; z-index: 0; }
  .hero-badge { display: inline-block; border: 1px solid rgba(0,242,254,0.3); color: var(--cyan); font-size: 0.7rem; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; padding: 6px 18px; border-radius: 999px; margin-bottom: 28px; position: relative; z-index: 1; animation: fadeUp 0.6s ease both; }
  .hero-title { font-family: var(--font-display); font-size: clamp(4rem, 14vw, 10rem); line-height: 0.92; letter-spacing: 2px; position: relative; z-index: 1; animation: fadeUp 0.7s 0.1s ease both; }
  .hero-title .line-cyan { color: var(--cyan); }
  .hero-title .line-white { color: #fff; }
  .hero-title .line-yellow { color: var(--yellow); }
  .hero-sub { margin-top: 28px; font-size: clamp(0.95rem, 2.5vw, 1.15rem); color: var(--muted); max-width: 480px; font-weight: 300; position: relative; z-index: 1; animation: fadeUp 0.7s 0.2s ease both; }
  .hero-cta { margin-top: 44px; display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; position: relative; z-index: 1; animation: fadeUp 0.7s 0.3s ease both; }
  .btn-primary { background: var(--cyan); color: #000; font-family: var(--font-body); font-weight: 600; font-size: 0.9rem; letter-spacing: 0.5px; padding: 14px 32px; border: none; border-radius: 999px; cursor: pointer; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 0 24px rgba(0,242,254,0.25); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 40px rgba(0,242,254,0.4); }
  .btn-ghost { background: transparent; color: var(--text); font-family: var(--font-body); font-weight: 500; font-size: 0.9rem; padding: 14px 32px; border: 1px solid var(--border); border-radius: 999px; cursor: pointer; text-decoration: none; transition: border-color 0.2s, color 0.2s; }
  .btn-ghost:hover { border-color: var(--cyan); color: var(--cyan); }
  .scroll-hint { position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 8px; color: var(--muted); font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; z-index: 1; animation: fadeUp 1s 0.8s ease both; }
  .scroll-line { width: 1px; height: 40px; background: linear-gradient(to bottom, var(--cyan), transparent); animation: scrollPulse 2s ease infinite; }
  @keyframes scrollPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
  .stats-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); position: relative; z-index: 1; }
  .stat-item { background: var(--bg); padding: 28px 20px; text-align: center; }
  .stat-number { font-family: var(--font-display); font-size: 2.8rem; color: var(--cyan); line-height: 1; }
  .stat-label { font-size: 0.72rem; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 6px; }
  .section { padding: 80px 24px; max-width: 960px; margin: 0 auto; position: relative; z-index: 1; }
  .section-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--cyan); margin-bottom: 12px; }
  .section-title { font-family: var(--font-display); font-size: clamp(2.4rem, 6vw, 4rem); line-height: 1; margin-bottom: 16px; }
  .section-body { color: var(--muted); font-size: 1rem; font-weight: 300; max-width: 520px; margin-bottom: 48px; }
  .steps-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 2px; background: var(--border); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .step-card { background: var(--surface); padding: 32px 28px; position: relative; transition: background 0.3s; }
  .step-card:hover { background: #131720; }
  .step-num { font-family: var(--font-display); font-size: 4rem; color: rgba(0,242,254,0.08); line-height: 1; position: absolute; top: 16px; right: 20px; }
  .step-icon { font-size: 1.8rem; margin-bottom: 16px; }
  .step-title { font-weight: 600; font-size: 1rem; margin-bottom: 8px; color: #fff; }
  .step-desc { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }
  .divider { width: 100%; height: 1px; background: var(--border); position: relative; z-index: 1; }
  #analyzer { padding: 80px 24px 100px; max-width: 680px; margin: 0 auto; position: relative; z-index: 1; }
  .tool-header { text-align: center; margin-bottom: 40px; }
  .upload-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .upload-zone { border: 2px dashed rgba(0,242,254,0.2); border-radius: 14px; margin: 24px; padding: 48px 24px; text-align: center; cursor: pointer; transition: all 0.25s ease; background: rgba(0,242,254,0.01); }
  .upload-zone:hover, .upload-zone.drag-over { border-color: var(--cyan); background: rgba(0,242,254,0.04); }
  .upload-zone input[type="file"] { display: none; }
  .uz-icon { width: 56px; height: 56px; margin: 0 auto 18px; background: rgba(0,242,254,0.08); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }

  .uz-sub { font-size: 0.8rem; color: var(--muted); }

  .file-preview .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
  .btn-analyze { width: calc(100% - 48px); margin: 0 24px 24px; background: var(--cyan); color: #000; font-family: var(--font-body); font-weight: 700; font-size: 0.95rem; letter-spacing: 1px; text-transform: uppercase; padding: 16px; border: none; border-radius: 12px; cursor: pointer; transition: all 0.2s; display: none; }
  .btn-analyze:hover { background: #2af8ff; box-shadow: 0 0 32px rgba(0,242,254,0.3); }
  .processing-panel { display: none; flex-direction: column; align-items: center; padding: 48px 24px; text-align: center; gap: 16px; }
  .radar-ring { position: relative; width: 80px; height: 80px; }
  .radar-ring::before, .radar-ring::after { content: ''; position: absolute; border-radius: 50%; border: 2px solid var(--cyan); animation: radarPulse 1.8s ease-out infinite; }
  .radar-ring::before { inset: 0; }
  .radar-ring::after { inset: 12px; animation-delay: 0.6s; opacity: 0.5; }
  .radar-dot { position: absolute; inset: 32px; background: var(--cyan); border-radius: 50%; box-shadow: 0 0 16px var(--cyan); }
  @keyframes radarPulse { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.6); opacity: 0; } }
  .processing-label { font-family: var(--font-display); font-size: 1.6rem; color: var(--cyan); letter-spacing: 2px; }
  .processing-sub { font-size: 0.8rem; color: var(--muted); letter-spacing: 1px; }
  .results-panel { display: none; flex-direction: column; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border-top: 1px solid var(--border); }
  .stat-cell { background: var(--surface); padding: 20px 16px; text-align: center; }
  .stat-cell .val { font-family: var(--font-display); font-size: 2.2rem; color: var(--cyan); line-height: 1; }
  .stat-cell .lbl { font-size: 0.65rem; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 4px; }
  .video-wrap { background: #000; position: relative; }
  .video-wrap video { width: 100%; height: auto; display: block; }
  
  .video-controls-strip { display: flex; align-items: center; justify-content: space-between; background: #0b0d14; padding: 10px 16px; border-bottom: 1px solid var(--border); gap: 12px; }
  .speed-selector-wrap { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .speed-select { background: var(--surface); border: 1px solid var(--border); color: #fff; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; font-family: var(--font-body); cursor: pointer; outline: none; transition: border-color 0.2s; }
  .speed-select:focus { border-color: var(--cyan); }
  .btn-download-stream { background: rgba(0, 242, 254, 0.08); color: var(--cyan); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; padding: 6px 14px; border: 1px solid rgba(0, 242, 254, 0.2); border-radius: 6px; cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
  .btn-download-stream:hover { background: var(--cyan); color: #000; }

  .result-actions { display: flex; gap: 12px; padding: 20px 24px; border-top: 1px solid var(--border); }
  .btn-again { flex: 1; background: transparent; color: var(--text); font-family: var(--font-body); font-weight: 500; font-size: 0.85rem; padding: 12px; border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.2s; text-align: center; }
  .btn-again:hover { border-color: var(--cyan); color: var(--cyan); }

  .ref-section { padding: 0 24px 80px; max-width: 680px; margin: 0 auto; position: relative; z-index: 1; }
  .ref-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .ref-header { padding: 20px 24px 14px; border-bottom: 1px solid var(--border); }
  .ref-header-title { font-family: var(--font-display); font-size: 1.5rem; letter-spacing: 1px; color: #fff; }
  .ref-header-sub { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }
  .ref-metric { border-bottom: 1px solid var(--border); }
  .ref-metric:last-child { border-bottom: none; }
  .ref-metric-header { display: flex; align-items: center; gap: 10px; padding: 16px 24px; cursor: pointer; user-select: none; }
  .ref-metric-icon { font-size: 1.1rem; }
  .ref-metric-name { font-weight: 600; font-size: 0.9rem; color: #fff; flex: 1; }
  .ref-chevron { color: var(--muted); font-size: 0.65rem; transition: transform 0.25s; }
  .ref-metric.open .ref-chevron { transform: rotate(180deg); }
  .ref-rows { display: none; padding: 0 24px 16px; flex-direction: column; gap: 6px; }
  .ref-metric.open .ref-rows { display: flex; }
  .ref-row { display: grid; grid-template-columns: 10px 1fr auto; align-items: start; gap: 12px; padding: 10px 12px; border-radius: 8px; background: rgba(255,255,255,0.02); }
