services:
  - type: web
    name: perfect-release-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --timeout 300 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: video-storage
      mountPath: /opt/render/project/src/static
      sizeGB: 1
