services:
  - type: web
    name: perfect-release-cricket-ball
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --worker-class gevent --workers 1 --timeout 600 --keep-alive 600 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    packages:
      - ffmpeg
    disk:
      name: video-storage
      mountPath: /opt/render/project/src/static
      sizeGB: 1
